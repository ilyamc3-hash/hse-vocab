const STORAGE_KEY = "vocab-cards-v1";
const LOG_KEY = "vocab-daily-log-v1";
const now = () => Date.now();
const DAY = 86400000;
const SIZE_OPTIONS = [10, 20, 30];

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function makeCard(term, translation, idx, category = "HSE", example = "") {
  return { id: `c${idx}`, term, translation, category, example, status: "new", interval: 0, ease: 2.3, nextReview: now(), reviewCount: 0, correctCount: 0 };
}
function normalize(s) { return s.trim().toLowerCase().replace(/ё/g, "е").replace(/[.,!?;:]/g, ""); }
function speak(text) {
  try {
    if (!window.speechSynthesis || !text) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "en-US";
    utter.rate = 0.95;
    window.speechSynthesis.speak(utter);
  } catch (e) { console.error("speech failed", e); }
}

/* ---------- Storage: real browser localStorage (persists reliably, this is a standalone site) ---------- */
function loadCards() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      return parsed.map((c) => ({ category: "HSE", status: "new", example: "", ...c }));
    }
  } catch (e) { console.error("load failed", e); }
  return SEED_WORDS.map(([t, r, ex], i) => makeCard(t, r, i, "HSE", ex));
}
function saveCards(cards) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(cards)); return true; }
  catch (e) { console.error("save failed", e); return false; }
}
function loadLog() {
  try { const raw = localStorage.getItem(LOG_KEY); if (raw) return JSON.parse(raw); }
  catch (e) {}
  return {};
}
function saveLog(log) {
  try { localStorage.setItem(LOG_KEY, JSON.stringify(log)); return true; }
  catch (e) { console.error("log save failed", e); return false; }
}
function checkStorageOk() {
  try {
    const k = "__vocab_check__";
    localStorage.setItem(k, "1");
    const ok = localStorage.getItem(k) === "1";
    localStorage.removeItem(k);
    return ok;
  } catch (e) { return false; }
}

/* ---------- Icons ---------- */

  speaker: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" {...p}><path d="M4 9v6h4l5 4V5L8 9H4Z" strokeLinejoin="round" /><path d="M16.5 8.5a5 5 0 0 1 0 7M19.5 5.5a9 9 0 0 1 0 13" strokeLinecap="round" /></svg>,
};

function Placard({ children, tone = "default", className = "", style = {} }) {
  const ringColor = tone === "danger" ? C.danger : tone === "success" ? C.success : C.accent;
  const ringOpacity = tone === "default" ? 0.25 : 0.45;
  return (
    <div className={`relative rounded-sm ${className}`} style={{
      background: C.surface,
      boxShadow: `inset 0 0 0 1px ${ringColor}${Math.round(ringOpacity * 255).toString(16).padStart(2, "0")}`,
      clipPath: "polygon(0 12px, 12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%)",
      ...style,
    }}>{children}</div>
  );
}

function Gauge({ pct, label, value }) {
  const r = 54, c = 2 * Math.PI * r, dash = c * 0.75, offset = dash - (pct / 100) * dash;
  return (
    <div className="relative w-40 h-40 flex items-center justify-center">
      <svg viewBox="0 0 140 140" className="w-full h-full" style={{ transform: "rotate(-135deg)" }}>
        <circle cx="70" cy="70" r={r} fill="none" stroke={C.surfaceAlt} strokeWidth="10" strokeDasharray={`${dash} ${c}`} strokeLinecap="round" />
        <circle cx="70" cy="70" r={r} fill="none" stroke={C.accent} strokeWidth="10" strokeDasharray={`${dash} ${c}`} strokeDashoffset={offset} strokeLinecap="round" style={{ transition: "stroke-dashoffset 0.6s ease" }} />
      </svg>
      <div className="absolute flex flex-col items-center">
        <span className="font-mono text-3xl tabular-nums" style={{ color: C.text }}>{value}</span>
        <span className="text-[10px] tracking-[0.15em] uppercase mt-1" style={{ color: C.textMuted }}>{label}</span>
      </div>
    </div>
  );
}

function ActivityStrip({ log }) {
  const days = useMemo(() => {
    const arr = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now() - i * DAY);
      const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      arr.push({ key, count: log[key]?.reviews || 0, label: "ПВСЧПСВ"[d.getDay()] });
    }
    return arr;
  }, [log]);
  const max = Math.max(1, ...days.map((d) => d.count));
  return (
    <div className="flex items-end gap-2 w-full max-w-sm px-1">
      {days.map((d) => (
        <div key={d.key} className="flex-1 flex flex-col items-center gap-1.5">
          <div className="w-full rounded-[2px]" style={{ height: 36 * (d.count / max) + (d.count ? 4 : 2), background: d.count ? C.accent : C.surfaceAlt, minHeight: 2 }} />
          <span className="text-[9px]" style={{ color: C.textMuted }}>{d.label}</span>
        </div>
      ))}
    </div>
  );
}

function SessionPicker({ title, deckSize, onPick, onCancel, showOptions, direction, onDirection, answerMode, onAnswerMode }) {
  const options = SIZE_OPTIONS.filter((n) => n < deckSize);
  const dirOptions = [
    { id: "forward", label: "EN → RU" },
    { id: "reverse", label: "RU → EN" },
    { id: "mixed", label: "Вперемешку" },
  ];
  const modeOptions = [
    { id: "flip", label: "Переворот" },
    { id: "type", label: "Написать самому" },
  ];
  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center" style={{ background: "rgba(0,0,0,0.55)" }} onClick={onCancel}>
      <div className="w-full max-w-md" onClick={(e) => e.stopPropagation()}>
        <Placard className="px-6 py-6 flex flex-col gap-4 mx-3 mb-3">
          <div className="text-center">
            <div className="text-[10px] tracking-[0.2em] uppercase mb-1" style={{ color: C.textMuted }}>{title}</div>
            <div className="font-oswald text-lg" style={{ color: C.text }}>Сколько слов пройти?</div>
          </div>

          {showOptions && (
            <>
              <div className="flex flex-col gap-2">
                <span className="text-[10px] tracking-[0.15em] uppercase" style={{ color: C.textMuted }}>Направление</span>
                <div className="grid grid-cols-3 gap-2">
                  {dirOptions.map((o) => (
                    <button key={o.id} onClick={() => onDirection(o.id)} className="rounded-sm py-2 text-xs font-medium border"
                      style={{ borderColor: direction === o.id ? C.accent : C.border, color: direction === o.id ? C.accent : C.textMuted, background: direction === o.id ? C.accentDim : "transparent" }}>
                      {o.label}
                    </button>
                  ))}
                </div>
              </div>
              <div className="flex flex-col gap-2">
                <span className="text-[10px] tracking-[0.15em] uppercase" style={{ color: C.textMuted }}>Ответ</span>
                <div className="grid grid-cols-2 gap-2">
                  {modeOptions.map((o) => (
                    <button key={o.id} onClick={() => onAnswerMode(o.id)} className="rounded-sm py-2 text-xs font-medium border"
                      style={{ borderColor: answerMode === o.id ? C.accent : C.border, color: answerMode === o.id ? C.accent : C.textMuted, background: answerMode === o.id ? C.accentDim : "transparent" }}>
                      {o.label}
                    </button>
                  ))}
                </div>
              </div>
            </>
          )}

          <div className="grid grid-cols-2 gap-2.5">
            {options.map((n) => (
              <button key={n} onClick={() => onPick(n)} className="rounded-sm py-3 text-sm font-medium border" style={{ borderColor: C.border, color: C.text }}>{n} слов</button>
            ))}
            <button onClick={() => onPick(deckSize)} className="rounded-sm py-3 text-sm font-medium" style={{ background: C.accent, color: C.bg, gridColumn: options.length % 2 === 0 ? "span 2" : "span 1" }}>Все ({deckSize})</button>
          </div>
          <button onClick={onCancel} className="text-xs" style={{ color: C.textMuted }}>Отмена</button>
        </Placard>
      </div>
    </div>
  );
}

function Home({ cards, log, storageOk, onStart, onCards, onList, onLearning }) {
  const due = cards.filter((c) => c.nextReview <= now()).length;
  const known = cards.filter((c) => c.status === "known").length;
  const learning = cards.filter((c) => c.status === "learning").length;
  const pct = Math.round((known / cards.length) * 100) || 0;
  return (
    <div className="flex flex-col items-center px-6 pt-10 pb-8 gap-7">
      {storageOk === false && (
        <div className="w-full max-w-sm flex items-start gap-2 px-4 py-3 rounded-sm" style={{ background: C.dangerDim, color: C.danger }}>
          <Icon.warning className="w-4 h-4 mt-0.5 shrink-0" />

function buildQuestion(card, allCards) {
  const types = ["mcq-forward", "mcq-reverse", "type-forward", "type-reverse"];
  const type = types[Math.floor(Math.random() * types.length)];
  const forward = type.endsWith("forward");
  const prompt = forward ? card.term : card.translation;
  const answer = forward ? card.translation : card.term;
  if (type.startsWith("mcq")) {
    const pool = allCards.filter((c) => c.id !== card.id);
    const distractors = [];
    for (const c of shuffle(pool)) {
      const val = forward ? c.translation : c.term;
      if (!distractors.includes(val)) distractors.push(val);
      if (distractors.length === 3) break;
    }
    return { kind: "mcq", forward, prompt, answer, options: shuffle([answer, ...distractors]), card };
  }
  return { kind: "type", forward, prompt, answer, card };
}

function Training({ cards, allCards, onFinish, onAnswer }) {
  const [order] = useState(() => shuffle(cards));
  const [idx, setIdx] = useState(0);
  const [question, setQuestion] = useState(() => buildQuestion(order[0], allCards));
  const [selected, setSelected] = useState(null);
  const [typed, setTyped] = useState("");
  const [revealed, setRevealed] = useState(false);
  const [wasCorrect, setWasCorrect] = useState(null);
  const total = order.length;

  const submitTyped = () => {
    if (revealed || !typed.trim()) return;
    const correct = normalize(typed) === normalize(question.answer);
    setWasCorrect(correct); setRevealed(true); onAnswer(question.card, correct);
  };
  const selectOption = (opt) => {
    if (revealed) return;
    const correct = opt === question.answer;
    setSelected(opt); setWasCorrect(correct); setRevealed(true); onAnswer(question.card, correct);
  };
  const next = () => {
    if (idx + 1 >= total) { onFinish(); return; }
    const nextIdx = idx + 1;
    setIdx(nextIdx); setQuestion(buildQuestion(order[nextIdx], allCards));
    setSelected(null); setTyped(""); setRevealed(false); setWasCorrect(null);
  };

  return (
    <div className="flex flex-col px-6 pt-8 pb-8 gap-6 min-h-[520px]">
      <div className="flex items-center gap-3">
        <div className="flex-1 h-1.5 rounded-full overflow-hidden" style={{ background: C.surfaceAlt }}>
          <div className="h-full transition-all duration-500" style={{ width: `${((idx + (revealed ? 1 : 0)) / total) * 100}%`, background: C.accent }} />
        </div>
        <span className="font-mono text-xs tabular-nums" style={{ color: C.textMuted }}>{idx + 1}/{total}</span>
      </div>
      <Placard className="px-6 py-10 flex flex-col items-center text-center gap-3 min-h-[160px] justify-center">
        <span className="text-[10px] tracking-[0.2em] uppercase" style={{ color: C.textMuted }}>{question.forward ? "EN → RU" : "RU → EN"}</span>
        <span className="font-oswald text-2xl leading-snug" style={{ color: C.text }}>{question.prompt}</span>
      </Placard>
      {question.kind === "mcq" ? (
        <div className="grid gap-3">
          {question.options.map((opt, i) => {
            const isAnswer = opt === question.answer, isSelected = opt === selected;
            let borderColor = C.border, bg = "transparent", color = C.text;
            if (revealed && isAnswer) { borderColor = C.success; bg = C.successDim; color = C.success; }
            else if (revealed && isSelected && !isAnswer) { borderColor = C.danger; bg = C.dangerDim; color = C.danger; }
            return <button key={i} onClick={() => selectOption(opt)} disabled={revealed} className="rounded-sm px-4 py-3 text-left text-sm transition-colors border" style={{ borderColor, background: bg, color }}>{opt}</button>;
          })}
        </div>
      ) : (
        <div className="flex flex-col gap-3">
          <input value={typed} onChange={(e) => setTyped(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submitTyped()} disabled={revealed} placeholder="Напиши перевод..." autoFocus
            className="rounded-sm px-4 py-3 outline-none text-sm border" style={{ background: C.surface, color: C.text, borderColor: revealed ? (wasCorrect ? C.success : C.danger) : C.border }} />
          {revealed && !wasCorrect && <div className="text-sm" style={{ color: C.textMuted }}>Правильный ответ: <span style={{ color: C.success }}>{question.answer}</span></div>}
          {!revealed && <button onClick={submitTyped} className="rounded-sm py-3 text-sm" style={{ background: C.surfaceAlt, color: C.text }}>Проверить</button>}
        </div>
      )}
      {revealed && (
        <div className="flex flex-col gap-2 mt-2">
          <div className="flex items-center justify-between">
            <span className="flex items-center gap-1.5 text-sm font-medium" style={{ color: wasCorrect ? C.success : C.danger }}>

function SwipeCard({ card, dir, onDecide, flipped, onFlip }) {
  const ref = useRef(null);
  const [drag, setDrag] = useState({ x: 0, active: false });
  const startX = useRef(0);
  const moved = useRef(false);
  const frontLabel = dir === "forward" ? "EN" : "RU";
  const backLabel = dir === "forward" ? "RU" : "EN";
  const frontText = dir === "forward" ? card.term : card.translation;
  const backText = dir === "forward" ? card.translation : card.term;

  const onPointerDown = (e) => { startX.current = e.clientX; moved.current = false; setDrag({ x: 0, active: true }); ref.current?.setPointerCapture?.(e.pointerId); };
  const onPointerMove = (e) => { if (!drag.active) return; const dx = e.clientX - startX.current; if (Math.abs(dx) > 6) moved.current = true; setDrag({ x: dx, active: true }); };
  const onPointerUp = () => {
    const threshold = 90;
    if (drag.x > threshold) onDecide("known");
    else if (drag.x < -threshold) onDecide("learning");
    else if (!moved.current) onFlip();
    setDrag({ x: 0, active: false });
  };
  const rotate = drag.x / 18;
  const rightGlow = Math.max(0, drag.x / 100), leftGlow = Math.max(0, -drag.x / 100);

  return (
    <div ref={ref} onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} className="relative select-none touch-none"
      style={{ transform: `translateX(${drag.x}px) rotate(${rotate}deg)`, transition: drag.active ? "none" : "transform 0.35s ease", cursor: "grab" }}>
      <Placard className="px-6 py-14 flex flex-col items-center text-center gap-4 min-h-[220px] justify-center"
        style={{ boxShadow: `inset 0 0 0 2px ${rightGlow > leftGlow ? `rgba(95,167,119,${Math.min(0.8, rightGlow)})` : `rgba(214,86,74,${Math.min(0.8, leftGlow)})`}` }}>
        <span className="text-[10px] tracking-[0.2em] uppercase" style={{ color: C.textMuted }}>{flipped ? backLabel : frontLabel} · тап, чтобы {flipped ? "скрыть" : "открыть"} перевод</span>
        <span className="font-oswald text-2xl leading-snug" style={{ color: C.text }}>{flipped ? backText : frontText}</span>
      </Placard>
    </div>
  );
}

function Cards({ cards, onDone, onDecide, onUndo, direction = "mixed", answerMode = "flip" }) {
  const [order] = useState(() =>
    shuffle(cards).map((c) => ({ ...c, _dir: direction === "mixed" ? (Math.random() < 0.5 ? "forward" : "reverse") : direction }))
  );
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [tally, setTally] = useState({ known: 0, learning: 0 });
  const [history, setHistory] = useState([]);
  const [typed, setTyped] = useState("");
  const [revealed, setRevealed] = useState(false);
  const [lastCorrect, setLastCorrect] = useState(null);
  const tallyRef = useRef({ known: 0, learning: 0 });
  const total = order.length;

  if (total === 0) {
    return <div className="flex flex-col items-center px-6 pt-16 gap-4 text-center"><span className="text-sm" style={{ color: C.textMuted }}>Тут пока пусто</span><button onClick={() => onDone(tallyRef.current)} className="text-sm" style={{ color: C.accent }}>Назад</button></div>;
  }
  const card = order[idx];
  const forward = card._dir === "forward";
  const frontText = forward ? card.term : card.translation;
  const answerText = forward ? card.translation : card.term;

  const resetCardState = () => { setFlipped(false); setTyped(""); setRevealed(false); setLastCorrect(null); };

  const recordOnly = (status) => {
    const prevStatus = card.status;
    onDecide(card, status);
    setHistory((h) => [...h, { index: idx, card, chosenStatus: status, prevStatus }]);
    tallyRef.current = { ...tallyRef.current, [status]: tallyRef.current[status] + 1 };
    setTally(tallyRef.current);
  };

  const goNext = () => {
    resetCardState();
    if (idx + 1 >= total) onDone(tallyRef.current); else setIdx(idx + 1);
  };

  const decide = (status) => { recordOnly(status); goNext(); };

  const submitTyped = () => {
    if (revealed || !typed.trim()) return;
    const correct = normalize(typed) === normalize(answerText);
    recordOnly(correct ? "known" : "learning");
    setLastCorrect(correct);
    setRevealed(true);
  };

  const undo = () => {
    if (history.length === 0) return;
    const last = history[history.length - 1];
    setHistory((h) => h.slice(0, -1));
    onUndo(last.card, last.prevStatus, last.chosenStatus);
    tallyRef.current = { ...tallyRef.current, [last.chosenStatus]: Math.max(0, tallyRef.current[last.chosenStatus] - 1) };
    setTally(tallyRef.current);
    setIdx(last.index);
    resetCardState();
  };

  return (
    <div className="flex flex-col px-6 pt-8 pb-8 gap-6 min-h-[520px]">
      <div className="flex items-center gap-3">
        <div className="flex-1 h-1.5 rounded-full overflow-hidden" style={{ background: C.surfaceAlt }}>
          <div className="h-full transition-all duration-500" style={{ width: `${(idx / total) * 100}%`, background: C.accent }} />
        </div>
        <span className="font-mono text-xs tabular-nums" style={{ color: C.textMuted }}>{idx + 1}/{total}</span>
      </div>
      {history.length > 0 && <button onClick={undo} className="self-end -mt-2 text-xs flex items-center gap-1" style={{ color: C.textMuted }}><Icon.undo className="w-3.5 h-3.5" /> Отменить последний</button>}

      {answerMode === "flip" ? (
        <>
          <SwipeCard card={card} dir={card._dir} flipped={flipped} onFlip={() => setFlipped((f) => !f)} onDecide={decide} />
          {(flipped || forward) && (
            <div className="flex flex-col items-center gap-1.5 -mt-2">
              <button onClick={() => speak(card.term)} className="flex items-center gap-1.5 text-sm" style={{ color: C.accent }}>
                <Icon.speaker className="w-4 h-4" /> Прослушать
              </button>
              {card.example && <span className="text-xs italic text-center leading-snug px-4" style={{ color: C.textMuted }}>{card.example}</span>}
            </div>
          )}
          <div className="grid grid-cols-2 gap-3">
            <button onClick={() => decide("learning")} className="rounded-sm py-4 flex items-center justify-center gap-2 text-sm font-medium border" style={{ borderColor: C.danger, color: C.danger }}><Icon.x className="w-4 h-4" /> Ещё учу</button>
            <button onClick={() => decide("known")} className="rounded-sm py-4 flex items-center justify-center gap-2 text-sm font-medium border" style={{ borderColor: C.success, color: C.success }}><Icon.check className="w-4 h-4" /> Знаю</button>
          </div>
          <span className="text-center text-[11px]" style={{ color: C.textMuted }}>Свайп влево — ещё учу · свайп вправо — знаю</span>
        </>
      ) : (
        <>
          <Placard className="px-6 py-10 flex flex-col items-center text-center gap-3 min-h-[160px] justify-center">
            <span className="text-[10px] tracking-[0.2em] uppercase" style={{ color: C.textMuted }}>{forward ? "EN → RU" : "RU → EN"}</span>
            <div className="flex items-center gap-2">
              <span className="font-oswald text-2xl leading-snug" style={{ color: C.text }}>{frontText}</span>
              {forward && (
                <button onClick={() => speak(card.term)} style={{ color: C.accent }}>
                  <Icon.speaker className="w-5 h-5" />
                </button>
              )}
            </div>
            {forward && card.example && (
              <span className="text-xs italic leading-snug" style={{ color: C.textMuted }}>{card.example}</span>
            )}
          </Placard>
          <div className="flex flex-col gap-3">
            <input
              value={typed} onChange={(e) => setTyped(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && submitTyped()}
              disabled={revealed} placeholder="Напиши перевод..." autoFocus
              className="rounded-sm px-4 py-3 outline-none text-sm border"
              style={{ background: C.surface, color: C.text, borderColor: revealed ? (lastCorrect ? C.success : C.danger) : C.border }}
            />
            {revealed && !lastCorrect && (
              <div className="text-sm" style={{ color: C.textMuted }}>Правильный ответ: <span style={{ color: C.success }}>{answerText}</span></div>
            )}
            {!revealed ? (
              <button onClick={submitTyped} className="rounded-sm py-3 text-sm" style={{ background: C.surfaceAlt, color: C.text }}>Проверить</button>
            ) : (
              <>
                <div className="flex items-center justify-between mt-1">
                  <span className="flex items-center gap-1.5 text-sm font-medium" style={{ color: lastCorrect ? C.success : C.danger }}>
                    {lastCorrect ? <Icon.check className="w-4 h-4" /> : <Icon.x className="w-4 h-4" />} {lastCorrect ? "Верно" : "Неверно"}
                  </span>
                  <button onClick={goNext} className="font-oswald tracking-wide px-6 py-2.5 rounded-sm flex items-center gap-1.5" style={{ background: C.accent, color: C.bg }}>
                    {idx + 1 >= total ? "ФИНИШ" : "ДАЛЬШЕ"} <Icon.arrow className="w-4 h-4" />
                  </button>
                </div>
                {!forward && card.example && (
                  <div className="flex items-start gap-2">
                    <button onClick={() => speak(card.term)} style={{ color: C.accent }} className="mt-0.5 shrink-0">
                      <Icon.speaker className="w-4 h-4" />
                    </button>
                    <span className="text-xs italic leading-snug" style={{ color: C.textMuted }}>{card.example}</span>
                  </div>
                )}
              </>
            )}
          </div>
        </>
      )}
    </div>
  );
}

function BulkImport({ onImport }) {
  const [open, setOpen] = useState(false);
  const [text, setText] = useState("");
  const [msg, setMsg] = useState("");
  const doImport = () => {
    const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
    const parsed = [];
    lines.forEach((line) => {
      const parts = line.split(";").map((p) => p.trim());
      if (parts[0] && parts[1]) parsed.push({ term: parts[0], translation: parts[1], category: parts[2] || "HSE", example: parts[3] || "" });
    });
    if (parsed.length > 0) onImport(parsed);
    setMsg(`Добавлено слов: ${parsed.length} из ${lines.length} строк`);
    setText("");
  };
  return (
    <Placard className="px-4 py-4 flex flex-col gap-2">
      <button onClick={() => setOpen((o) => !o)} className="flex items-center justify-between text-sm" style={{ color: C.text }}>
        <span className="flex items-center gap-2"><Icon.upload className="w-4 h-4" style={{ color: C.textMuted }} /> Массовый импорт</span>
        <span style={{ color: C.textMuted }}>{open ? "−" : "+"}</span>
      </button>
      {open && (
        <div className="flex flex-col gap-2 mt-1">
          <span className="text-xs" style={{ color: C.textMuted }}>По одной строке: термин;перевод;категория;пример (категория и пример необязательны)</span>
          <textarea value={text} onChange={(e) => setText(e.target.value)} rows={5} placeholder={"Hazard;Опасность;HSE\nDeadline;Крайний срок;Общие"}
            className="rounded-sm px-3 py-2 text-sm outline-none border font-mono" style={{ background: C.bg, borderColor: C.border, color: C.text }} />
          <button onClick={doImport} className="rounded-sm py-2 text-sm" style={{ background: C.accent, color: C.bg }}>Импортировать</button>
          {msg && <span className="text-xs" style={{ color: C.success }}>{msg}</span>}
        </div>
      )}
    </Placard>
  );
}

  const [editTranslation, setEditTranslation] = useState("");
  const [editCategory, setEditCategory] = useState("HSE");
  const [editExample, setEditExample] = useState("");

  const submit = () => { if (!term.trim() || !translation.trim()) return; onAdd(term.trim(), translation.trim(), category, example.trim()); setTerm(""); setTranslation(""); setExample(""); };
  const startEdit = (c) => { setEditingId(c.id); setEditTerm(c.term); setEditTranslation(c.translation); setEditCategory(c.category || "HSE"); setEditExample(c.example || ""); };
  const saveEdit = (id) => { onUpdate(id, { term: editTerm.trim(), translation: editTranslation.trim(), category: editCategory, example: editExample.trim() }); setEditingId(null); };

  const filtered = cards.filter((c) => {
    if (filter === "learning" && c.status !== "learning") return false;
    if (filter !== "all" && filter !== "learning" && c.category !== filter) return false;
    if (query.trim()) {
      const q = normalize(query);
      if (!normalize(c.term).includes(q) && !normalize(c.translation).includes(q)) return false;
    }
    return true;
  });

  const tabs = [{ id: "all", label: "Все" }, { id: "HSE", label: "HSE" }, { id: "Общие", label: "Общие" }, { id: "learning", label: "Плохо знаю" }];

  return (
    <div className="flex flex-col px-6 pt-8 pb-8 gap-4">
      <button onClick={onBack} className="text-sm flex items-center gap-1.5 self-start mb-1" style={{ color: C.textMuted }}><Icon.arrow className="w-4 h-4" style={{ transform: "rotate(180deg)" }} /> Назад</button>
      <h2 className="font-oswald text-2xl" style={{ color: C.text }}>Список слов</h2>
      <div className="relative">
        <Icon.search className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2" style={{ color: C.textMuted }} />
        <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Найти слово..." className="w-full rounded-sm pl-9 pr-3 py-2 text-sm outline-none border" style={{ background: C.surface, borderColor: C.border, color: C.text }} />
      </div>
      <div className="flex gap-2 overflow-x-auto pb-1">
        {tabs.map((t) => (
          <button key={t.id} onClick={() => setFilter(t.id)} className="text-xs px-3 py-1.5 rounded-full whitespace-nowrap border" style={{ borderColor: filter === t.id ? C.accent : C.border, color: filter === t.id ? C.accent : C.textMuted, background: filter === t.id ? C.accentDim : "transparent" }}>{t.label}</button>
        ))}
      </div>
      <Placard className="px-4 py-4 flex flex-col gap-2">
        <input value={term} onChange={(e) => setTerm(e.target.value)} placeholder="Термин (EN)" className="rounded-sm px-3 py-2 text-sm outline-none border" style={{ background: C.bg, borderColor: C.border, color: C.text }} />
        <input value={translation} onChange={(e) => setTranslation(e.target.value)} placeholder="Перевод (RU)" className="rounded-sm px-3 py-2 text-sm outline-none border" style={{ background: C.bg, borderColor: C.border, color: C.text }} />
        <input value={example} onChange={(e) => setExample(e.target.value)} placeholder="Пример предложения (необязательно)" className="rounded-sm px-3 py-2 text-sm outline-none border" style={{ background: C.bg, borderColor: C.border, color: C.text }} />
        <select value={category} onChange={(e) => setCategory(e.target.value)} className="rounded-sm px-3 py-2 text-sm outline-none border" style={{ background: C.bg, borderColor: C.border, color: C.text }}>
          <option value="HSE">HSE</option><option value="Общие">Общие</option>
        </select>
        <button onClick={submit} className="rounded-sm py-2 text-sm mt-1" style={{ background: C.surfaceAlt, color: C.text }}>+ Добавить слово</button>
      </Placard>
      <BulkImport onImport={onBulkAdd} />
      <div className="flex flex-col gap-2 mt-1">
        {filtered.length === 0 && <span className="text-sm text-center py-6" style={{ color: C.textMuted }}>Ничего не найдено</span>}
        {filtered.map((c) => (
          <div key={c.id} className="py-2.5 border-b" style={{ borderColor: C.border }}>
            {editingId === c.id ? (
              <div className="flex flex-col gap-2">
                <input value={editTerm} onChange={(e) => setEditTerm(e.target.value)} className="rounded-sm px-3 py-2 text-sm outline-none border" style={{ background: C.bg, borderColor: C.border, color: C.text }} />
                <input value={editTranslation} onChange={(e) => setEditTranslation(e.target.value)} className="rounded-sm px-3 py-2 text-sm outline-none border" style={{ background: C.bg, borderColor: C.border, color: C.text }} />
                <input value={editExample} onChange={(e) => setEditExample(e.target.value)} placeholder="Пример предложения" className="rounded-sm px-3 py-2 text-sm outline-none border" style={{ background: C.bg, borderColor: C.border, color: C.text }} />
                <select value={editCategory} onChange={(e) => setEditCategory(e.target.value)} className="rounded-sm px-3 py-2 text-sm outline-none border" style={{ background: C.bg, borderColor: C.border, color: C.text }}>
                  <option value="HSE">HSE</option><option value="Общие">Общие</option>
                </select>
                <div className="flex gap-2">
                  <button onClick={() => saveEdit(c.id)} className="flex-1 rounded-sm py-2 text-sm" style={{ background: C.accent, color: C.bg }}>Сохранить</button>
                  <button onClick={() => setEditingId(null)} className="flex-1 rounded-sm py-2 text-sm border" style={{ borderColor: C.border, color: C.textMuted }}>Отмена</button>
                  <button onClick={() => onDelete(c.id)} className="px-3 rounded-sm border" style={{ borderColor: C.danger, color: C.danger }}><Icon.trash className="w-4 h-4" /></button>
                </div>
              </div>
            ) : (
              <div className="flex items-center justify-between gap-2">
                <div className="flex-1 min-w-0" onClick={() => startEdit(c)}>
                  <div className="text-sm truncate" style={{ color: C.text }}>{c.term}</div>
                  <div className="text-xs truncate" style={{ color: C.textMuted }}>{c.translation}</div>
                </div>
                <button onClick={() => speak(c.term)} style={{ color: C.accent }}><Icon.speaker className="w-4 h-4" /></button>
                <StatusTag status={c.status} />
                <button onClick={() => startEdit(c)} style={{ color: C.textMuted }}><Icon.pencil className="w-4 h-4" /></button>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [cards, setCards] = useState(() => loadCards());
  const [log, setLog] = useState(() => loadLog());
  const [storageOk] = useState(() => checkStorageOk());
  const [screen, setScreen] = useState("home");
  const [sessionStats, setSessionStats] = useState(null);
  const [cardsTally, setCardsTally] = useState(null);
  const [listFilter, setListFilter] = useState("all");
  const [sessionDeck, setSessionDeck] = useState([]);
  const [picker, setPicker] = useState(null);
  const [direction, setDirection] = useState("mixed");
  const [answerMode, setAnswerMode] = useState("flip");

  const persist = useCallback((updated) => { setCards(updated); saveCards(updated); }, []);
  const recordReview = useCallback((correct) => {
    setLog((prev) => {
      const key = todayKey();
      const day = prev[key] || { reviews: 0, correct: 0 };
      const updated = { ...prev, [key]: { reviews: day.reviews + 1, correct: day.correct + (correct ? 1 : 0) } };
      saveLog(updated); return updated;
    });
  }, []);
  const recordUndo = useCallback((wasKnown) => {
    setLog((prev) => {
      const key = todayKey();
      const day = prev[key] || { reviews: 0, correct: 0 };
      const updated = { ...prev, [key]: { reviews: Math.max(0, day.reviews - 1), correct: Math.max(0, day.correct - (wasKnown ? 1 : 0)) } };
      saveLog(updated); return updated;
    });
  }, []);

  const dueCards = useMemo(() => {
    const due = cards.filter((c) => c.nextReview <= now());
    return due.length >= 5 ? due : shuffle(cards).slice(0, Math.min(10, cards.length));
  }, [cards]);
  const learningCards = useMemo(() => cards.filter((c) => c.status === "learning"), [cards]);

  const handleAnswer = useCallback((card, correct) => {
    setCards((prev) => {
      const updated = prev.map((c) => {
        if (c.id !== card.id) return c;
        const reviewCount = c.reviewCount + 1;
        if (correct) {
          const ease = Math.min(2.8, c.ease + 0.1);
          const interval = c.interval === 0 ? 1 : Math.round(c.interval * ease);
          return { ...c, interval, ease, reviewCount, correctCount: c.correctCount + 1, nextReview: now() + interval * DAY };
        }
        const ease = Math.max(1.3, c.ease - 0.2);
        return { ...c, interval: 1, ease, reviewCount, nextReview: now() + DAY };
      });
      saveCards(updated); return updated;
    });
    setSessionStats((s) => (s ? { total: s.total + 1, correct: s.correct + (correct ? 1 : 0) } : s));
    recordReview(correct);
  }, [recordReview]);

  const handleSwipeDecide = useCallback((card, status) => {
    setCards((prev) => { const updated = prev.map((c) => (c.id === card.id ? { ...c, status } : c)); saveCards(updated); return updated; });
    recordReview(status === "known");
  }, [recordReview]);

  const handleUndo = useCallback((card, prevStatus, chosenStatus) => {
    setCards((prev) => { const updated = prev.map((c) => (c.id === card.id ? { ...c, status: prevStatus } : c)); saveCards(updated); return updated; });
    recordUndo(chosenStatus === "known");
  }, [recordUndo]);

  const openPicker = (mode) => setPicker(mode);
  const startSession = (size) => {
    if (picker === "marathon") { setSessionDeck(shuffle(dueCards).slice(0, size)); setSessionStats({ total: 0, correct: 0 }); setScreen("training"); }
    else if (picker === "cards") { setSessionDeck(shuffle(cards).slice(0, size)); setScreen("cards"); }
    else if (picker === "learning") { setSessionDeck(shuffle(learningCards).slice(0, size)); setScreen("cards"); }
    setPicker(null);
  };

  const addWord = (term, translation, category, example) => persist([...cards, makeCard(term, translation, `${Date.now()}`, category, example)]);
  const addWords = (list) => { const base = Date.now(); persist([...cards, ...list.map((w, i) => makeCard(w.term, w.translation, `${base}_${i}`, w.category, w.example || ""))]); };
  const updateWord = (id, fields) => persist(cards.map((c) => (c.id === id ? { ...c, ...fields } : c)));
  const deleteWord = (id) => persist(cards.filter((c) => c.id !== id));

  const pickerDeckSize = picker === "marathon" ? dueCards.length : picker === "cards" ? cards.length : picker === "learning" ? learningCards.length : 0;
  const pickerTitle = picker === "marathon" ? "Марафон" : picker === "cards" ? "Карточки" : "Плохо знаю";

  return (
    <div className="min-h-screen" style={{ background: C.bg }}>
      <div className="max-w-md mx-auto">
        {screen === "home" && <Home cards={cards} log={log} storageOk={storageOk} onStart={() => openPicker("marathon")} onCards={() => openPicker("cards")} onLearning={() => openPicker("learning")} onList={() => { setListFilter("all"); setScreen("list"); }} />}
        {screen === "training" && <Training cards={sessionDeck} allCards={cards} onAnswer={handleAnswer} onFinish={() => setScreen("results")} />}
        {screen === "results" && sessionStats && <Results stats={sessionStats} onHome={() => setScreen("home")} />}
        {screen === "cards" && <Cards cards={sessionDeck} direction={direction} answerMode={answerMode} onDecide={handleSwipeDecide} onUndo={handleUndo} onDone={(tally) => { setCardsTally(tally); setScreen("cardsResults"); }} />}
        {screen === "cardsResults" && cardsTally && <CardsResults tally={cardsTally} onHome={() => setScreen("home")} />}
        {screen === "list" && <WordList cards={cards} onBack={() => setScreen("home")} onAdd={addWord} onUpdate={updateWord} onDelete={deleteWord} onBulkAdd={addWords} initialFilter={listFilter} />}
      </div>
      {picker && pickerDeckSize > 0 && (
        <SessionPicker
          title={pickerTitle}
          deckSize={pickerDeckSize}
          onPick={startSession}
          onCancel={() => setPicker(null)}
          showOptions={picker === "cards" || picker === "learning"}
          direction={direction}
          onDirection={setDirection}
          answerMode={answerMode}
          onAnswerMode={setAnswerMode}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
